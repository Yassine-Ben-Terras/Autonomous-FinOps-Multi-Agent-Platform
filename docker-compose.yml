# CloudSense — Local Development Stack
# Starts all infrastructure services needed to run CloudSense locally.
# Services: ClickHouse, PostgreSQL, Kafka + Zookeeper, Redis
# Usage: make docker-up

services:

  # ── ClickHouse — OLAP billing analytics ────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.5
    container_name: cloudsense-clickhouse
    ports:
      - "8123:8123"    # HTTP interface
      - "9000:9000"    # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: cloudsense
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — metadata, config, users ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cloudsense-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cloudsense
      POSTGRES_USER: cloudsense
      POSTGRES_PASSWORD: cloudsense
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper — required by Kafka ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: cloudsense-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper

  # ── Kafka — real-time billing event stream ──────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cloudsense-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Redis — caching, queues, agent short-term memory ───────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cloudsense-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clickhouse_data:
  postgres_data:
  zookeeper_data:
  kafka_data:
  redis_data:

networks:
  default:
    name: cloudsense-network
