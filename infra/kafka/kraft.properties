# ============================================================
# CloudSense — Kafka KRaft Broker Configuration
# KIP-833: Remove ZooKeeper dependency (Kafka 3.3+)
# ============================================================
# This single config file replaces both server.properties AND
# the ZooKeeper connection. No zookeeper.connect is needed.
# ============================================================

# ── Node identity ─────────────────────────────────────────────
# Unique node ID — must be different for each broker in the cluster
node.id=1

# KRaft process roles: this node acts as both broker AND controller
# In production, separate controller-only nodes are recommended (3 controllers)
process.roles=broker,controller

# The controller quorum voters: {nodeId}@{host}:{controllerPort}
# For a 3-node cluster: 1@broker1:9093,2@broker2:9093,3@broker3:9093
controller.quorum.voters=1@localhost:9093

# ── Listeners ─────────────────────────────────────────────────
# Listener names
listeners=PLAINTEXT://:9092,CONTROLLER://:9093
advertised.listeners=PLAINTEXT://localhost:9092

# Which listener the controller uses for inter-broker communication
controller.listener.names=CONTROLLER
inter.broker.listener.name=PLAINTEXT

listener.security.protocol.map=\
  PLAINTEXT:PLAINTEXT,\
  CONTROLLER:PLAINTEXT

# ── Log storage ───────────────────────────────────────────────
log.dirs=/var/lib/kafka/data

# ── Replication & reliability ─────────────────────────────────
default.replication.factor=3
min.insync.replicas=2
offsets.topic.replication.factor=3
transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2

# ── Retention ────────────────────────────────────────────────
log.retention.hours=168           # 7 days
log.segment.bytes=1073741824      # 1 GB per segment
log.retention.check.interval.ms=300000

# ── Performance ───────────────────────────────────────────────
num.partitions=12
num.network.threads=8
num.io.threads=16
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# ── Auto-create topics ────────────────────────────────────────
# Set to false in production — CloudSense creates topics explicitly
auto.create.topics.enable=false

# ── Metadata quorum ───────────────────────────────────────────
# KRaft: how long to wait for the metadata log to catch up on startup
metadata.log.dir=/var/lib/kafka/metadata
