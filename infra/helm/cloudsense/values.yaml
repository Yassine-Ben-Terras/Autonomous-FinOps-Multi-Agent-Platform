# Default values for CloudSense
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: cloudsense/api
  pullPolicy: IfNotPresent
  tag: "0.2.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: cloudsense.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: cloudsense-tls
      hosts:
        - cloudsense.example.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - cloudsense
          topologyKey: kubernetes.io/hostname

# ── External Dependencies ────────────────────────────────────────────────────

clickhouse:
  enabled: true
  host: cloudsense-clickhouse
  port: 8123
  database: cloudsense

postgres:
  enabled: true
  host: cloudsense-postgres
  port: 5432
  database: cloudsense

kafka:
  enabled: true
  bootstrapServers: cloudsense-kafka:9092

redis:
  enabled: true
  host: cloudsense-redis
  port: 6379

# ── Agent Configuration ──────────────────────────────────────────────────────

agents:
  supervisor:
    enabled: true
    llmProvider: anthropic  # anthropic | openai
  slack:
    enabled: false
    channel: "#cloudsense-alerts"
  opa:
    enabled: false
    url: http://opa:8181/v1/data/cloudsense

# ── Observability ────────────────────────────────────────────────────────────

observability:
  otel:
    enabled: false
    endpoint: ""
  langsmith:
    enabled: false
    project: cloudsense
  prometheus:
    enabled: true
  grafana:
    enabled: false
