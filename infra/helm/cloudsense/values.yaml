replicaCount: 2
image:
  repository: cloudsense
  pullPolicy: IfNotPresent
  tag: "0.3.0"
service:
  type: ClusterIP
  port: 8000
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: cloudsense.local
      paths:
        - path: /
          pathType: Prefix
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
podAntiAffinity:
  enabled: true
env:
  APP_ENV: production
  CLICKHOUSE_HOST: clickhouse
  POSTGRES_HOST: postgresql
  REDIS_HOST: redis
