apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloudsense.fullname" . }}-secrets
  labels:
    {{- include "cloudsense.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64-encoded secrets — override in production
  # Use: echo -n 'your-secret' | base64
  secret-key: {{ randAlphaNum 32 | b64enc | quote }}
